name: 'Tag inactive issues'
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: 'This issue is stale because it has been open 180 days with no activity.'
          stale-pr-message: 'This PR is stale because it has been open 180 days with no activity.'
          close-issue-message: 'This issue was closed because it has been stalled for 180 days with no activity.'
          close-pr-message: 'This PR was closed because it has been stalled for 180 days with no activity.'
          days-before-issue-stale: 180
          days-before-pr-stale: 180
          days-before-issue-close: -1
          days-before-pr-close: -1
          operations-per-run: 200